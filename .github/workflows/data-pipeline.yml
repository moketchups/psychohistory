name: Data Pipeline

on:
  schedule:
    # Schedule pinned to EST (UTC-5). In summer (EDT) all times shift 1h earlier in local terms.
    - cron: '0 13-20 * * 1-5'      # Mon-Fri hourly, 8am-3pm ET (8 firings, last at 3pm = pre-close)
    - cron: '0 2 * * 2-6'           # Mon-Fri 9pm ET (next-day 02:00 UTC)
    - cron: '0 0,6,12,18 * * 0,6'   # Sat+Sun every 6h (unchanged cadence)
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tavily-python gnews feedparser yfinance openai

      - name: Run data pipeline
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python data_feeds.py

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "psychohistory-bot"
          git config user.email "bot@moketchups.github.io"
          git add current_events.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            EVENT_COUNT=$(python3 -c "import json; print(len(json.load(open('current_events.json')).get('events',[])))" 2>/dev/null || echo "?")
            git commit -m "Auto-update data [$(date -u +%Y-%m-%dT%H:%M:%SZ)] ($EVENT_COUNT events)"

            # Retry loop: push races with manual commits (e.g. live-feed ripples). On rejection,
            # fetch-rebase and retry up to 5 times with exponential backoff. current_events.json
            # is pipeline-owned, so rebasing our single-file commit onto concurrent site commits
            # is safe (no path conflicts). Fails loudly after 5 attempts.
            PUSHED=false
            for attempt in 1 2 3 4 5; do
              if git push; then
                echo "Push succeeded on attempt $attempt"
                PUSHED=true
                break
              fi
              echo "Push rejected on attempt $attempt — fetching and rebasing"
              git fetch origin main
              git pull --rebase origin main || { echo "Rebase failed on attempt $attempt"; exit 1; }
              sleep $((2 ** (attempt - 1)))
            done
            if [ "$PUSHED" = "false" ]; then
              echo "Push failed after 5 attempts — aborting"
              exit 1
            fi
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: ingest
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Pull latest
        run: git pull origin main
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
