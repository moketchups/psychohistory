name: Data Pipeline

on:
  schedule:
    # Schedule pinned to EST (UTC-5). In summer (EDT) all times shift 1h earlier in local terms.
    - cron: '0 13-20 * * 1-5'      # Mon-Fri hourly, 8am-3pm ET (8 firings, last at 3pm = pre-close)
    - cron: '0 2 * * 2-6'           # Mon-Fri 9pm ET (next-day 02:00 UTC)
    - cron: '0 0,6,12,18 * * 0,6'   # Sat+Sun every 6h (unchanged cadence)
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tavily-python gnews feedparser yfinance openai

      - name: Run data pipeline
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python data_feeds.py

      - name: Commit and push if changed
        run: |
          git config user.name "psychohistory-bot"
          git config user.email "bot@moketchups.github.io"
          git add current_events.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            git push
          fi
