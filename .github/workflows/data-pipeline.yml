name: Data Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tavily-python gnews feedparser yfinance

      - name: Run data pipeline
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: python data_feeds.py

      - name: Commit and push if changed
        run: |
          git config user.name "psychohistory-bot"
          git config user.email "bot@moketchups.github.io"
          git add current_events.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            git push
          fi
