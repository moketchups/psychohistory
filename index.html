<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psychohistory Prediction Engine</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #c8c8d4;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 13px;
  line-height: 1.6;
  overflow-x: hidden;
}

/* HEADER */
.header {
  background: #0d1117;
  border-bottom: 1px solid #f0883e44;
  padding: 14px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 14px; color: #f0883e; letter-spacing: 1.5px; }
.header-right { display: flex; align-items: center; gap: 16px; }
.header-pos { color: #7ee787; font-size: 11px; }
.header-mag { color: #f0883e; font-size: 18px; font-weight: 700; }

/* LAYOUT */
.container { max-width: 1300px; margin: 0 auto; padding: 16px 20px; }

/* CARDS */
.card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 14px;
  margin-bottom: 12px;
}
.card-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #8b949e;
  margin-bottom: 10px;
}

/* GRID */
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

/* STATS */
.stat-big { font-size: 26px; font-weight: 700; color: #f0883e; }
.stat-med { font-size: 15px; font-weight: 600; color: #bc8cff; }
.stat-sub { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

/* DIMENSION BARS */
.dim-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.dim-label { width: 85px; font-size: 10px; color: #8b949e; text-align: right; }
.dim-track { flex: 1; height: 5px; background: #21262d; border-radius: 3px; overflow: hidden; }
.dim-fill { height: 100%; border-radius: 0 3px 3px 0; }
.dim-num { width: 36px; font-size: 10px; color: #c8c8d4; text-align: right; }
.dim-wt { width: 24px; font-size: 9px; color: #484f58; text-align: center; }

/* CHART */
.chart-wrap {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 14px;
  margin-bottom: 12px;
}
.chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.chart-header h2 { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #8b949e; }
.range-btns { display: flex; gap: 2px; }
.range-btn {
  padding: 3px 10px;
  border: 1px solid #30363d;
  background: none;
  color: #8b949e;
  font-family: inherit;
  font-size: 10px;
  cursor: pointer;
  border-radius: 3px;
}
.range-btn:hover { border-color: #484f58; color: #c8c8d4; }
.range-btn.on { background: #f0883e22; border-color: #f0883e; color: #f0883e; }
canvas#chart { width: 100%; height: 200px; }

/* TABS */
.tabs {
  display: flex;
  gap: 1px;
  margin-bottom: 14px;
  background: #0d1117;
  border-radius: 6px;
  padding: 2px;
  border: 1px solid #30363d;
  flex-wrap: wrap;
}
.tab-btn {
  padding: 7px 14px;
  border: none;
  background: none;
  color: #8b949e;
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  border-radius: 4px;
}
.tab-btn:hover { color: #c8c8d4; }
.tab-btn.on { background: #161b22; color: #f0883e; }
.tab-panel { display: none; }
.tab-panel.on { display: block; }

/* LIVE FEED */
.live-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.live-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.mkt-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #21262d; }
.mkt-name { color: #8b949e; font-size: 11px; }
.mkt-price { color: #c8c8d4; font-weight: 600; }
.mkt-up { color: #7ee787; font-size: 11px; }
.mkt-down { color: #f85149; font-size: 11px; }
.dim-tag { display: inline-block; padding: 2px 8px; margin: 2px; border-radius: 10px; font-size: 10px; }
.dim-tag-who { background: #bc8cff22; color: #bc8cff; border: 1px solid #bc8cff44; }
.dim-tag-where { background: #7ee78722; color: #7ee787; border: 1px solid #7ee78744; }
.dim-tag-why { background: #e3b34122; color: #e3b341; border: 1px solid #e3b34144; }
.ev-card { background: #0d1117; border: 1px solid #21262d; border-radius: 4px; padding: 8px 10px; margin-bottom: 6px; }
.ev-title { color: #c8c8d4; font-size: 11px; font-weight: 600; }
.ev-title a { color: #58a6ff; text-decoration: none; }
.ev-title a:hover { text-decoration: underline; }
.ev-meta { font-size: 10px; color: #484f58; margin-top: 3px; }
.ev-tags { margin-top: 4px; }
.ev-rel { display: inline-block; width: 18px; height: 18px; border-radius: 50%; text-align: center; line-height: 18px; font-size: 10px; font-weight: 700; margin-right: 6px; }
.ev-rel-high { background: #f8514933; color: #f85149; }
.ev-rel-med { background: #e3b34133; color: #e3b341; }
.ev-rel-low { background: #8b949e22; color: #8b949e; }
.window-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.window-active { background: #f0883e22; color: #f0883e; border: 1px solid #f0883e; }
.window-next { background: #58a6ff22; color: #58a6ff; border: 1px solid #58a6ff; }
.live-ts { font-size: 10px; color: #484f58; text-align: right; margin-top: 8px; }

/* SECTION TITLES */
.sec-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #f0883e;
  margin: 20px 0 10px 0;
  padding-bottom: 6px;
  border-bottom: 1px solid #f0883e33;
}

/* PRESSURE WINDOWS */
.pw {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  margin-bottom: 10px;
  overflow: hidden;
}
.pw-head {
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  user-select: none;
}
.pw-head:hover { background: #1c2128; }
.pw-name { font-size: 12px; color: #f0883e; font-weight: 600; }
.pw-dates { font-size: 10px; color: #8b949e; margin-left: 8px; }
.pw-peak { font-size: 10px; color: #8b949e; }
.pw-arrow { color: #484f58; font-size: 12px; transition: transform 0.2s; }
.pw.open .pw-arrow { transform: rotate(90deg); }
.pw-body { display: none; padding: 0 14px 14px 14px; }
.pw.open .pw-body { display: block; }

/* DIMENSION SECTIONS */
.ds { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #21262d; }
.ds:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.ds h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
.ds p { font-size: 11px; line-height: 1.7; color: #b1b8c0; }
.ds strong { color: #c8c8d4; }

/* TAGS */
.tg { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 9px; font-weight: 700; letter-spacing: 0.5px; }
.tg-when { background: #1f3d2a; color: #7ee787; }
.tg-what { background: #3d2a1f; color: #f0883e; }
.tg-who { background: #2a1f3d; color: #bc8cff; }
.tg-where { background: #1f2a3d; color: #79c0ff; }
.tg-why { background: #3d3d1f; color: #e3b341; }
.tg-con { background: #3d1f1f; color: #f85149; }
.tg-pred { background: #1f3d3d; color: #56d4dd; }

/* WATCH LIST */
.wl { list-style: none; margin-top: 8px; }
.wl li { padding: 2px 0; font-size: 11px; color: #b1b8c0; }
.wl li::before { content: "\25B8 "; color: #f0883e; }

/* PREDICTIONS */
.pred {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 14px;
  margin-bottom: 10px;
}
.pred h3 { color: #f0883e; font-size: 13px; margin-bottom: 3px; }
.pred-meta { color: #8b949e; font-size: 10px; margin-bottom: 8px; }
.pred-summary { color: #c8c8d4; font-size: 12px; font-weight: 600; margin-bottom: 8px; line-height: 1.5; }
.pred p { font-size: 11px; line-height: 1.7; color: #b1b8c0; }
.pred-spike { border-color: #f8514966; }

/* PLAYERS */
.player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; }
.pc {
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 5px;
  padding: 10px 12px;
}
.pc h4 { color: #bc8cff; font-size: 11px; margin-bottom: 2px; }
.pc .role { color: #f0883e; font-size: 10px; margin-bottom: 5px; }
.pc p { font-size: 10px; color: #8b949e; line-height: 1.5; }

/* DIVERGENCES */
.dv {
  background: #1a1215;
  border: 1px solid #f8514933;
  border-radius: 5px;
  padding: 10px 12px;
  margin-bottom: 8px;
}
.dv-sev { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.dv-high { color: #f85149; }
.dv-mod { color: #e3b341; }
.dv-low { color: #8b949e; }
.dv h3 { font-size: 12px; margin: 4px 0; }
.dv p { font-size: 11px; color: #8b949e; line-height: 1.6; }

/* TOOLTIP */
.tip {
  position: absolute;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 4px;
  padding: 8px 10px;
  font-size: 10px;
  pointer-events: none;
  z-index: 200;
  display: none;
  min-width: 200px;
  box-shadow: 0 4px 12px #00000066;
}
.tip-date { color: #f0883e; font-weight: 600; margin-bottom: 4px; }
.tip-row { display: flex; justify-content: space-between; gap: 12px; }
.tip-label { color: #8b949e; }
.tip-val { color: #c8c8d4; }

/* KEY / GUIDE STYLES */
.key-section { margin-bottom: 20px; }
.key-section h3 {
  color: #f0883e;
  font-size: 13px;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid #f0883e22;
}
.key-section p {
  font-size: 12px;
  line-height: 1.8;
  color: #b1b8c0;
  margin-bottom: 8px;
}
.key-section strong { color: #c8c8d4; }
.key-concept {
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 12px 14px;
  margin-bottom: 8px;
}
.key-concept h4 {
  color: #bc8cff;
  font-size: 11px;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.key-concept p {
  font-size: 11px;
  color: #8b949e;
  line-height: 1.7;
}
.key-convergence {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin: 10px 0;
}
.key-conv-item {
  background: #0d1117;
  border-radius: 5px;
  padding: 10px 12px;
  text-align: center;
}
.key-conv-item h5 { color: #f0883e; font-size: 10px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.key-conv-item .conv-date { font-size: 18px; font-weight: 700; color: #f85149; margin: 4px 0; }
.key-conv-item p { font-size: 10px; color: #8b949e; }

/* TIMELINE */
.timeline {
  position: relative;
  padding: 10px 0;
  margin: 14px 0;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 50%;
  top: 0;
  bottom: 0;
  width: 2px;
  background: #30363d;
  transform: translateX(-50%);
}
.tl-era {
  position: relative;
  display: flex;
  margin-bottom: 10px;
  align-items: center;
}
.tl-era:nth-child(odd) { flex-direction: row; }
.tl-era:nth-child(even) { flex-direction: row-reverse; }
.tl-content {
  width: 45%;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 5px;
  padding: 8px 12px;
}
.tl-spacer { width: 10%; text-align: center; }
.tl-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #f0883e;
  border: 2px solid #0a0a0f;
  position: relative;
  z-index: 2;
}
.tl-year { color: #f0883e; font-size: 11px; font-weight: 700; }
.tl-label { color: #bc8cff; font-size: 10px; }
.tl-desc { color: #8b949e; font-size: 10px; margin-top: 2px; line-height: 1.5; }

/* STRATEGY BLOCK */
.strat-block {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 14px;
  margin-bottom: 10px;
}
.strat-block h3 {
  color: #f0883e;
  font-size: 12px;
  margin-bottom: 6px;
}
.strat-block p {
  font-size: 11px;
  color: #b1b8c0;
  line-height: 1.7;
}

</style>
</head>

<script>
// ===== DATA =====
const TODAY = '2026-03-08';

// Find today's record
const todayRec = CHART_DATA.find(r => r.d === TODAY);
const yr2026 = CHART_DATA.filter(r => r.d.startsWith('2026')).sort((a,b) => b.m - a.m);
const todayRank = todayRec ? yr2026.findIndex(r => r.d === TODAY) + 1 : '?';

// ===== INIT STATS =====
if (todayRec) {
  document.getElementById('s-mag').textContent = todayRec.m.toFixed(4);
  document.getElementById('h-mag').textContent = todayRec.m.toFixed(3);
  document.getElementById('s-rank').textContent = todayRank;
  document.getElementById('s-date').textContent = TODAY;
  document.getElementById('s-aspect').textContent = todayRec.a || '--';
  document.getElementById('s-cy').textContent = todayRec.cy;

  const dims = [
    ['Temporal',      todayRec.t,   1.0, '#7ee787'],
    ['Spatial',       todayRec.s,   1.2, '#f0883e'],
    ['Numerological', todayRec.n,   0.8, '#bc8cff'],
    ['Symbolic',      todayRec.sym, 0.7, '#e3b341'],
    ['Psychological', todayRec.p,   1.0, '#79c0ff'],
    ['Chaotic',       todayRec.ch,  0.9, '#f85149'],
    ['Economic',      todayRec.e,   1.1, '#56d4dd']
  ];

  document.getElementById('dims').innerHTML = dims.map(([name, val, wt, col]) =>
    `<div class="dim-row">
      <span class="dim-label">${name}</span>
      <span class="dim-wt">${wt}</span>
      <div class="dim-track"><div class="dim-fill" style="width:${val*100}%;background:${col}"></div></div>
      <span class="dim-num">${val.toFixed(3)}</span>
    </div>`
  ).join('');
}

// ===== CHART =====
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const tipEl = document.getElementById('tooltip');
let currentRange = 'near';
let chartPoints = [];

function getFilteredData(range) {
  if (range === 'near') return CHART_DATA.filter(r => r.d <= '2027-12-31');
  if (range === 'mid') return CHART_DATA.filter(r => r.d <= '2032-12-31');
  return CHART_DATA;
}

function drawChart() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  const W = rect.width - 28;
  const H = 220;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const data = getFilteredData(currentRange);
  const pad = { t: 10, r: 10, b: 30, l: 44 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  // Find range
  let minM = 999, maxM = 0;
  data.forEach(r => { if (r.m < minM) minM = r.m; if (r.m > maxM) maxM = r.m; });
  minM = Math.floor(minM * 10) / 10 - 0.05;
  maxM = Math.ceil(maxM * 10) / 10 + 0.05;

  const xScale = i => pad.l + (i / (data.length - 1)) * cw;
  const yScale = v => pad.t + ch - ((v - minM) / (maxM - minM)) * ch;

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 0.5;
  const yTicks = 6;
  for (let i = 0; i <= yTicks; i++) {
    const v = minM + (maxM - minM) * (i / yTicks);
    const y = yScale(v);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    ctx.fillStyle = '#8b949e';
    ctx.font = '9px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(v.toFixed(2), pad.l - 4, y + 3);
  }

  // X labels
  ctx.textAlign = 'center';
  let lastLabel = '';
  const labelInterval = currentRange === 'near' ? 2 : currentRange === 'mid' ? 6 : 12;
  data.forEach((r, i) => {
    const mo = r.d.substring(0, 7);
    const moNum = parseInt(r.d.substring(5, 7));
    if (mo !== lastLabel && moNum % labelInterval === 1) {
      const x = xScale(i);
      ctx.fillStyle = '#484f58';
      ctx.font = '9px monospace';
      const label = currentRange === 'near' ? r.d.substring(2, 7) : r.d.substring(0, 4);
      ctx.fillText(label, x, H - pad.b + 14);
      lastLabel = mo;
    }
  });

  // Spatial fill
  ctx.beginPath();
  let hasSpatial = false;
  data.forEach((r, i) => {
    if (r.s > 0) {
      if (!hasSpatial) { ctx.moveTo(xScale(i), yScale(minM)); hasSpatial = true; }
      ctx.lineTo(xScale(i), yScale(minM + r.s * (maxM - minM) * 0.3));
    } else if (hasSpatial) {
      ctx.lineTo(xScale(i - 1), yScale(minM));
      ctx.closePath();
      hasSpatial = false;
    }
  });
  if (hasSpatial) { ctx.lineTo(xScale(data.length - 1), yScale(minM)); ctx.closePath(); }
  ctx.fillStyle = '#56d4dd15';
  ctx.fill();

  // Magnitude line
  ctx.beginPath();
  ctx.strokeStyle = '#f0883e';
  ctx.lineWidth = 1;
  data.forEach((r, i) => {
    const x = xScale(i);
    const y = yScale(r.m);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Fill under
  ctx.lineTo(xScale(data.length - 1), yScale(minM));
  ctx.lineTo(xScale(0), yScale(minM));
  ctx.closePath();
  ctx.fillStyle = '#f0883e08';
  ctx.fill();

  // Key points
  chartPoints = [];
  data.forEach((r, i) => {
    const x = xScale(i);
    const y = yScale(r.m);
    chartPoints.push({ x, y, r, i });

    // Today marker
    if (r.d === TODAY) {
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#7ee787';
      ctx.fill();
      ctx.fillStyle = '#7ee787';
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('NOW', x, y - 8);
    }
    // Spatial points
    else if (r.s >= 0.5) {
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#56d4dd';
      ctx.fill();
    }
    // 2032 spike
    else if (r.m >= 2.0) {
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#f85149';
      ctx.fill();
      ctx.fillStyle = '#f85149';
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('2032', x, y - 8);
    }
  });
}

// ===== LIVE FEED =====
function renderLive(data) {
  const el = document.getElementById('p-live');
  if (!data) { el.innerHTML = '<div style="color:#f85149;padding:20px">Failed to load live data. Run: python3 data_feeds.py</div>'; return; }

  // Window status
  const aw = data.engine_position?.active_windows?.[0];
  const nw = data.engine_position?.next_window;
  let windowHtml = '';
  if (aw) windowHtml = `<span class="window-badge window-active">ACTIVE: ${aw.name}</span> <span style="color:#8b949e;font-size:11px">${aw.start} to ${aw.end}</span>`;
  else if (nw) windowHtml = `<span class="window-badge window-next">NEXT: ${nw.name}</span> <span style="color:#8b949e;font-size:11px">${nw.days_until} days away</span>`;

  // Market
  const mkt = data.market_data || {};
  const mktHtml = Object.entries(mkt).map(([k,v]) => {
    const dir = v.change_5d >= 0;
    return `<div class="mkt-row"><span class="mkt-name">${k}</span><span class="mkt-price">${v.price.toLocaleString()}</span><span class="${dir?'mkt-up':'mkt-down'}">${dir?'+':''}${v.change_5d}%</span></div>`;
  }).join('');

  // Dimension bars
  const dims = data.dimension_summary || {};
  function dimBars(obj, cls) {
    const entries = Object.entries(obj);
    if (!entries.length) return '<span style="color:#484f58">No signals</span>';
    const mx = Math.max(...entries.map(e=>e[1]));
    return entries.slice(0,8).map(([k,v]) => {
      const pct = Math.round((v/mx)*100);
      return `<span class="dim-tag dim-tag-${cls}">${k.replace(/_/g,' ')}: ${v}</span>`;
    }).join(' ');
  }

  // Top events
  const events = (data.events || []).slice(0, 25);
  const evHtml = events.map(e => {
    const rel = e.tags?.relevance || 0;
    const relCls = rel >= 3 ? 'ev-rel-high' : rel >= 2 ? 'ev-rel-med' : 'ev-rel-low';
    const tags = [
      ...(e.tags?.players||[]).map(p => `<span class="dim-tag dim-tag-who">${p.replace(/_/g,' ')}</span>`),
      ...(e.tags?.theaters||[]).map(t => `<span class="dim-tag dim-tag-where">${t.replace(/_/g,' ')}</span>`),
      ...(e.tags?.incentives||[]).map(i => `<span class="dim-tag dim-tag-why">${i.replace(/_/g,' ')}</span>`),
    ].join('');
    const src = e.source === 'tavily' ? 'Search' : e.source === 'gnews' ? e.publisher || 'GNews' : e.feed || 'RSS';
    return `<div class="ev-card">
      <div class="ev-title"><span class="ev-rel ${relCls}">${rel}</span>${e.url ? `<a href="${e.url}" target="_blank">${(e.title||'').substring(0,100)}</a>` : (e.title||'').substring(0,100)}</div>
      <div class="ev-meta">${src} &bull; ${e.published || ''}</div>
      ${tags ? `<div class="ev-tags">${tags}</div>` : ''}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="sec-title">Live Data Feed &mdash; ${data.date || 'Unknown'}</div>
    <div style="margin-bottom:12px">${windowHtml}</div>

    <div class="live-grid">
      <div class="card">
        <div class="card-title">Market Snapshot (5-Day)</div>
        ${mktHtml}
      </div>
      <div class="card">
        <div class="card-title">Ingestion Summary</div>
        <div style="margin-bottom:8px"><span class="stat-big">${data.meta?.total_events || 0}</span> <span class="stat-sub">events ingested</span></div>
        <div><span class="stat-med">${data.meta?.high_relevance_events || 0}</span> <span class="stat-sub">high relevance (3+ dimensions)</span></div>
        <div style="margin-top:8px;font-size:10px;color:#484f58">Tavily: ${data.meta?.sources?.tavily||0} &bull; GNews: ${data.meta?.sources?.gnews||0} &bull; RSS: ${data.meta?.sources?.rss||0}</div>
      </div>
    </div>

    <div class="live-grid-3">
      <div class="card"><div class="card-title">WHO (Player Mentions)</div>${dimBars(dims.WHO||{}, 'who')}</div>
      <div class="card"><div class="card-title">WHERE (Theater Activity)</div>${dimBars(dims.WHERE||{}, 'where')}</div>
      <div class="card"><div class="card-title">WHY (Incentive Signals)</div>${dimBars(dims.WHY||{}, 'why')}</div>
    </div>

    <div class="card">
      <div class="card-title">Top Events (by relevance)</div>
      ${evHtml}
    </div>

    <div class="live-ts">Last ingestion: ${data.timestamp || 'Unknown'} &bull; Run <code>python3 data_feeds.py</code> to refresh</div>
  `;
}

// Load live data
fetch('current_events.json')
  .then(r => r.json())
  .then(renderLive)
  .catch(() => renderLive(null));
